name: CI

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main
      - staging

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_lint:
    name: Build & Lint
    runs-on: ubuntu-latest

    # Needed so the GITHUB_TOKEN can read the private @sideby-me/* packages
    # (@sideby-me/rtc) from GitHub Packages during `npm ci`.
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Several deps (mediasoup-client, vite 8, vitest 4) require Node >=20/22.
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci
        env:
          # .npmrc reads ${NODE_AUTH_TOKEN} for npm.pkg.github.com. Prefer a PAT
          # secret (PACKAGES_READ_TOKEN) if present; otherwise fall back to the
          # workflow GITHUB_TOKEN (works once the package grants this repo read access).
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGES_READ_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Check Code Formatting
        run: npm run format:check

      - name: Lint Code
        run: npm run lint

      - name: Build Project
        run: npm run build
